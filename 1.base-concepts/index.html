<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Решение квадратных уравнений</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input {
            margin: 5px;
            padding: 8px;
            width: 80px;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h2>Решение квадратного уравнения ax² + bx + c = 0</h2>
    <div>
        <input type="number" id="a" placeholder="a">
        <span>x² + </span>
        <input type="number" id="b" placeholder="b">
        <span>x + </span>
        <input type="number" id="c" placeholder="c">
        <span>= 0</span>
    </div>
    <br>
    <button onclick="calculate()">Решить уравнение</button>
    <div class="result" id="result"></div>

    <script src="solveEquation.js"></script>
    <script>
        function calculate() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);

            const roots = solveEquation(a, b, c);

            const resultDiv = document.getElementById('result');
            if (roots.length === 0) {
                resultDiv.innerHTML = "Корней нет";
            } else if (roots.length === 1) {
                resultDiv.innerHTML = `Один корень: x = ${roots[0]}`;
            } else {
                resultDiv.innerHTML = `Два корня: x₁ = ${roots[0]}, x₂ = ${roots[1]}`;
            }
        }
    </script>
</body>
</html>
